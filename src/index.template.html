<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Toddler Tracker helps parents log food exploration, repeated eating, and maintenance check-ins with low-friction input." />
    <meta name="theme-color" content="#f3f1e6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="First Bites" />
    <meta name="format-detection" content="telephone=no" />
    <title>Toddler Tracker</title>
    <style>{{TAILWIND}}</style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        var binary = atob("{{ELM}}");
        var bytes = Uint8Array.from(binary, function (char) {
          return char.charCodeAt(0);
        });
        var source = new TextDecoder("utf-8").decode(bytes);
        new Function(source)();
      })();
    </script>
    <script>
      (function () {
        var storageKey = "toddler-food-tracker";
        var app = Elm.Main.init({ node: document.getElementById("app") });

        function loadFoods() {
          try {
            var raw = localStorage.getItem(storageKey);
            var parsed = raw ? JSON.parse(raw) : null;

            if (Array.isArray(parsed) || parsed === null) {
              app.ports.foodsLoaded.send({ foods: parsed, acceptanceThreshold: null });
            } else {
              app.ports.foodsLoaded.send(parsed);
            }
          } catch (error) {
            console.warn("Unable to load food tracker state", error);
            app.ports.foodsLoaded.send({ foods: null, acceptanceThreshold: null });
          }
        }

        function saveFoods(payload) {
          try {
            localStorage.setItem(storageKey, JSON.stringify(payload));
          } catch (error) {
            console.warn("Unable to save food tracker state", error);
          }
        }

        function clearFoods() {
          try {
            localStorage.removeItem(storageKey);
          } catch (error) {
            console.warn("Unable to clear food tracker state", error);
          }
        }

        function requestClearFood(foodId) {
          var confirmed = window.confirm("Clear all logged data for this food? This keeps the food itself, but removes its history.");

          if (confirmed && app.ports && app.ports.clearFoodConfirmed) {
            app.ports.clearFoodConfirmed.send(foodId);
          }
        }

        if (app.ports && app.ports.saveFoods) {
          app.ports.saveFoods.subscribe(saveFoods);
        }

        if (app.ports && app.ports.clearFoods) {
          app.ports.clearFoods.subscribe(clearFoods);
        }

        if (app.ports && app.ports.requestNow && app.ports.nowLoaded) {
          app.ports.requestNow.subscribe(function () {
            app.ports.nowLoaded.send(Date.now());
          });
        }

        if (app.ports && app.ports.requestClearFood) {
          app.ports.requestClearFood.subscribe(requestClearFood);
        }

        if (app.ports && app.ports.foodsLoaded) {
          loadFoods();
        }
      })();
    </script>
  </body>
</html>
